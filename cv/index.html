<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta http-equiv="refresh" content="0; url=../assets/lucas-fernandez-sarmiento-cv-may-2026.pdf" />
  <title>Lucas Fernandez Sarmiento CV</title>
  <link rel="canonical" href="https://luklacasito.github.io/cv" />
  <style>
    :root {
      --ink: #101a14;
      --paper: #eef0dc;
      --green: #2d6f3e;
      --line: rgba(36, 95, 53, 0.24);
      --white: #fbf2df;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 24px;
      background:
        radial-gradient(circle at 78% 18%, rgba(190, 205, 146, 0.34), transparent 22rem),
        linear-gradient(180deg, rgba(238, 240, 220, 0.98), rgba(216, 222, 193, 0.98)),
        var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(100%, 420px);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(251, 242, 223, 0.84);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--green);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 500;
      line-height: 1.15;
    }

    p {
      margin: 0;
      font-size: 15px;
    }

    a {
      color: var(--green);
      font-weight: 700;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening CV</h1>
    <p>
      If the PDF does not open automatically,
      <a href="../assets/lucas-fernandez-sarmiento-cv-may-2026.pdf">open the CV here</a>.
    </p>
  </main>
  <script>
    window.location.replace("../assets/lucas-fernandez-sarmiento-cv-may-2026.pdf");
  </script>
</body>
</html>
